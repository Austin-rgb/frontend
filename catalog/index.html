<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fieldwork — Product Catalog</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1714;
      --paper: #f5f0e8;
      --cream: #ede7d8;
      --amber: #c8892a;
      --amber-light: #e8b05a;
      --rust: #b04a2a;
      --sage: #5c7a5e;
      --muted: #8a7f72;
      --line: #d4cbbf;
      --white: #fdfaf5;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Instrument Sans', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: .5;
    }
  </style>
</head>

<body>

  <app-header></app-header>
  <catalog-toolbar></catalog-toolbar>
  <catalog-grid></catalog-grid>
  <product-modal></product-modal>
  <confirm-dialog></confirm-dialog>
  <toast-container></toast-container>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>

</html>
